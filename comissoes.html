<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coalize · Sistema de Comissões</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#f4f6f8;--panel:#fff;--panel2:#f7f9fb;--line:#e4e8ed;--ink:#1c2430;--muted:#6b7682;
    --green:#1e9e57;--green-d:#16934e;--gsoft:#e7f6ec;--gtext:#15834a;
    --amber:#b7791f;--asoft:#fbf1da;--red:#d64457;--rsoft:#fdeaed;--rtext:#c23a4c;--chip:#eef1f4;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
  .loginwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .loginbox{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:30px;width:100%;max-width:380px;box-shadow:0 10px 40px rgba(20,40,60,.08)}
  .loginbox .logo{font-weight:800;font-size:20px;display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .loginbox .logo .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#1e9e57,#37c47e)}
  .loginbox .sub{color:var(--muted);font-size:13px;margin:0 0 22px}
  .loginbox label{display:block;font-size:12.5px;color:var(--muted);margin:14px 0 5px;font-weight:600}
  .loginbox input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:var(--panel2)}
  .loginbox input:focus{outline:none;border-color:var(--green)}
  .loginbox button{width:100%;margin-top:20px;background:var(--green);color:#fff;border:0;padding:12px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer}
  .loginbox button:disabled{opacity:.6;cursor:default}
  .err{color:var(--rtext);font-size:13px;margin-top:12px;min-height:16px}
  .app{max-width:1120px;margin:0 auto;padding:0 18px 64px}
  header.top{display:flex;align-items:center;gap:12px;padding:18px 2px 8px;flex-wrap:wrap}
  .logo{font-weight:800;font-size:18px;display:flex;align-items:center;gap:9px}
  .logo .dot{width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,#1e9e57,#37c47e)}
  .spacer{flex:1}
  .userchip{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
  .userchip b{color:var(--ink)}
  .rolebadge{background:var(--gsoft);color:var(--gtext);padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700;text-transform:capitalize}
  .logout{background:var(--chip);border:1px solid var(--line);color:#3b4350;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 22px}
  .tab{background:var(--chip);color:#3b4350;border:1px solid var(--line);padding:9px 18px;border-radius:9px;font-weight:600;font-size:14px;cursor:pointer}
  .tab:hover{background:#e6eaee}
  .tab.active{background:var(--green);color:#fff;border-color:var(--green-d);box-shadow:0 1px 2px rgba(0,0,0,.12)}
  h2.sec{font-size:19px;margin:0 0 4px}
  .lead{color:var(--muted);font-size:14px;margin:0 0 16px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  @media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 16px}
  .kpi .lab{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .kpi .val{font-size:25px;font-weight:800;margin-top:6px}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .kpi.green .val{color:var(--green)} .kpi.red .val{color:var(--red)}
  .grid2{display:grid;grid-template-columns:1.05fr 1fr;gap:12px;margin-bottom:16px}
  @media(max-width:820px){.grid2{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .card h3{margin:0 0 14px;font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .donutwrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .legend{display:flex;flex-direction:column;gap:8px;font-size:13.5px;min-width:170px}
  .legend .li{display:flex;align-items:center;gap:9px}.legend .sw{width:11px;height:11px;border-radius:3px}.legend b{margin-left:auto}
  .bars{display:flex;flex-direction:column;gap:11px}
  .brow{display:grid;grid-template-columns:92px 1fr 100px;align-items:center;gap:10px;font-size:13px}
  .brow .nm{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .track{height:18px;background:#eef1f4;border-radius:6px;overflow:hidden;display:flex}.seg{height:100%}
  .brow .rs{text-align:right;color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  .tablewrap{overflow:auto;max-height:560px}
  th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);position:sticky;top:0;background:var(--panel)}
  tr:hover td{background:var(--panel2)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700}
  .s-PAGO{background:var(--gsoft);color:var(--gtext)}.s-PARCIAL{background:var(--asoft);color:var(--amber)}
  .s-INADIMPLENTE{background:var(--rsoft);color:var(--rtext)}.s-SEM{background:#eef1f4;color:var(--muted)}
  .toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  input.search,select{background:var(--panel);border:1px solid var(--line);color:var(--ink);padding:8px 11px;border-radius:9px;font-size:13.5px;outline:none}
  input.search{flex:1;min-width:200px}.count{font-size:12.5px;color:var(--muted)}
  .muted{color:var(--muted)}.small{font-size:12.5px}
  .banner{background:#eef6f0;border:1px solid #d6e9dd;border-left:3px solid var(--green);border-radius:0 12px 12px 0;padding:13px 15px;margin-bottom:16px;font-size:13.5px}
  .banner.warn{background:var(--asoft);border-color:#ecd9a8;border-left-color:var(--amber)}
  .empty{background:var(--panel);border:1px dashed #d3d9e0;border-radius:14px;padding:26px;color:var(--muted)}
  .empty .big{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .form2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:680px){.form2{grid-template-columns:1fr}}
  .form2 label{display:flex;flex-direction:column;gap:5px;font-size:12.5px;color:var(--muted)}
  .form2 .full{grid-column:1/-1}
  .form2 input,.form2 select{padding:8px 11px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;background:var(--panel2);color:var(--ink)}
  .btnp{background:var(--green);color:#fff;border:0;padding:9px 18px;border-radius:9px;font-weight:700;cursor:pointer;font-size:13.5px}
  .btng{background:var(--chip);color:#3b4350;border:1px solid var(--line);padding:9px 14px;border-radius:9px;cursor:pointer;font-size:13.5px}
  .lk{background:none;border:0;color:var(--green-d);cursor:pointer;font-size:13px;padding:0;text-decoration:underline}
  .tfit{table-layout:fixed;width:100%}
  .tfit th,.tfit td{white-space:normal;word-break:break-word}
  .ccopt{padding:7px 11px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--line)}
  .ccopt:hover{background:var(--panel2)}
  .foot{color:var(--muted);font-size:12px;margin-top:20px;line-height:1.5}
</style>
</head>
<body>

<div id="login" class="loginwrap">
  <div class="loginbox">
    <div class="logo"><span class="dot"></span> Coalize · Comissões</div>
    <p class="sub">Entre com seu e-mail e senha.</p>
    <label>E-mail</label>
    <input id="email" type="email" placeholder="voce@coalize.com.br" autocomplete="username">
    <label>Senha</label>
    <input id="senha" type="password" placeholder="********" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button id="btnLogin" onclick="doLogin()">Entrar</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="appmain" class="app" style="display:none">
  <header class="top">
    <div class="logo"><span class="dot"></span> Coalize · Comissões</div>
    <div class="spacer"></div>
    <div class="userchip"><span id="uName"></span><span class="rolebadge" id="uRole"></span>
      <button class="logout" onclick="doLogout()">Sair</button></div>
  </header>
  <div class="tabs" id="tabs"></div>
  <div id="view"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const SUPA_URL="https://wvqwcxvcihiqaymdqcbl.supabase.co";
const SUPA_KEY="sb_publishable_dFS29feNQ0CeuFL6n7qSSw_vwf8dMrx";
const SB = supabase.createClient(SUPA_URL, SUPA_KEY);
const CONTAS_DB = supabase.createClient("https://qvceorcngqsygasiivbn.supabase.co","sb_publishable_EXiaEiULuThk97lPa76F6A_7VntzxxW");

const TABS=['Vendas','Comissão vendedores','Contadores','Clientes','Comissão contadores','Pagamentos'];
const ALLOWED={
  admin:TABS,
  farmer:['Contadores','Comissão contadores','Pagamentos'],
  financeiro:TABS,
  vendedor:['Vendas'],
};
let ME={email:null,nome:null,role:null};
let ROWS=[];
let CONTADORES=[], edC=null;
let selContador='todos', selPeriodo='todos', selCloser='', selCarteira='';
let tab=null, pct=20;
const fmt=v=>'R$ '+(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const $=id=>document.getElementById(id);

async function init(){
  const {data:{session}}=await SB.auth.getSession();
  if(session){ await afterLogin(); } else { showLogin(); }
}
function showLogin(){ $('login').style.display='flex'; $('appmain').style.display='none'; }

async function doLogin(){
  const email=$('email').value.trim(), senha=$('senha').value;
  const btn=$('btnLogin'); $('loginErr').textContent=''; btn.disabled=true; btn.textContent='Entrando...';
  const {error}=await SB.auth.signInWithPassword({email,password:senha});
  btn.disabled=false; btn.textContent='Entrar';
  if(error){ $('loginErr').textContent = traduzErro(error.message); return; }
  await afterLogin();
}
function traduzErro(m){
  if(/Invalid login/i.test(m)) return 'E-mail ou senha incorretos.';
  if(/Email not confirmed/i.test(m)) return 'E-mail ainda nao confirmado (peca ao admin).';
  return m;
}
async function doLogout(){ await SB.auth.signOut(); ME={email:null,nome:null,role:null}; showLogin(); }

async function afterLogin(){
  const {data:{user}}=await SB.auth.getUser();
  ME.email=user.email;
  const {data:prof}=await SB.from('profiles').select('role,nome').eq('id',user.id).maybeSingle();
  ME.role=(prof&&prof.role)||'vendedor';
  ME.nome=(prof&&prof.nome)||user.email;
  const {data:rows}=await SB.from('conferencia_comissao').select('*');
  ROWS=rows||[];
  $('login').style.display='none'; $('appmain').style.display='block';
  $('uName').innerHTML='<b>'+ME.nome+'</b>'; $('uRole').textContent=ME.role;
  tab=ALLOWED[ME.role][0];
  render();
}

function agg(){
  const k={n:ROWS.length,pago:0,parcial:0,inad:0,sem:0,totPago:0};
  const cl={};
  ROWS.forEach(r=>{
    const s=r.status||''; if(s==='PAGO')k.pago++; else if(s.startsWith('PARCIAL'))k.parcial++; else if(s==='INADIMPLENTE')k.inad++; else k.sem++;
    k.totPago+=Number(r.valor_pago)||0;
    const n=(r.closer||'—').trim(); if(!cl[n])cl[n]={closer:n,total:0,pago:0,parcial:0,inad:0,pagoRS:0};
    const o=cl[n];o.total++; if(s==='PAGO')o.pago++; else if(s.startsWith('PARCIAL'))o.parcial++; else if(s==='INADIMPLENTE')o.inad++; o.pagoRS+=Number(r.valor_pago)||0;
  });
  k.closers=Object.values(cl).sort((a,b)=>b.total-a.total);
  return k;
}
function pill(s){s=s||'';const k=s.startsWith('PARCIAL')?'PARCIAL':(!s||s.startsWith('SEM'))?'SEM':s;return `<span class="pill s-${k}">${(!s||s.startsWith('SEM'))?'SEM COBR.':s}</span>`}

function elTabs(){
  const allow=ALLOWED[ME.role]||['Vendas'];
  if(!allow.includes(tab))tab=allow[0];
  $('tabs').innerHTML=allow.map(t=>`<button class="tab ${t===tab?'active':''}" onclick="setTab('${t}')">${t}</button>`).join('');
}
function setTab(t){tab=t;render()}

function donut(k){
  const segs=[['PAGO',k.pago,'#1e9e57'],['PARCIAL',k.parcial,'#e0a32a'],['INADIMPLENTE',k.inad,'#d64457'],['SEM COBR.',k.sem,'#aab3bd']];
  const tot=segs.reduce((a,s)=>a+s[1],0)||1,R=70,C=2*Math.PI*R;let off=0;
  const cir=segs.map(s=>{const len=C*s[1]/tot;const c=`<circle r="${R}" cx="90" cy="90" fill="none" stroke="${s[2]}" stroke-width="22" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 90 90)"/>`;off+=len;return c}).join('');
  const leg=segs.map(s=>`<div class="li"><span class="sw" style="background:${s[2]}"></span>${s[0]} <b>${s[1]}</b></div>`).join('');
  return `<div class="card"><h3>Status de pagamento · ${tot} clientes</h3><div class="donutwrap">
    <svg width="180" height="180" viewBox="0 0 180 180">${cir}<text x="90" y="84" text-anchor="middle" fill="#1c2430" font-size="30" font-weight="800">${Math.round(k.pago/tot*100)}%</text><text x="90" y="106" text-anchor="middle" fill="#6b7682" font-size="12">em dia</text></svg>
    <div class="legend">${leg}</div></div></div>`;
}
function closerBars(k){
  const max=Math.max(1,...k.closers.map(c=>c.total)),w=v=>(v/max*100).toFixed(1)+'%';
  const rows=k.closers.map(c=>`<div class="brow"><span class="nm">${c.closer}</span>
    <div class="track"><div class="seg" style="width:${w(c.pago)};background:#1e9e57"></div><div class="seg" style="width:${w(c.parcial)};background:#e0a32a"></div><div class="seg" style="width:${w(c.inad)};background:#d64457"></div></div>
    <span class="rs">${fmt(c.pagoRS)}</span></div>`).join('');
  return `<div class="card"><h3>Por closer</h3><div class="bars">${rows||'<span class="muted small">sem dados</span>'}</div></div>`;
}
const DRAW={};
function tableUI(id,cols){
  return `<div class="toolbar"><input class="search" id="${id}_q" placeholder="Buscar cliente..." oninput="DRAW['${id}']()">
    <select id="${id}_st" onchange="DRAW['${id}']()"><option value="">Todos status</option><option>PAGO</option><option>PARCIAL</option><option>INADIMPLENTE</option></select>
    <span class="count" id="${id}_c"></span></div>
    <div class="card" style="padding:0"><div class="tablewrap"><table><thead><tr>${cols}</tr></thead><tbody id="${id}_b"></tbody></table></div></div>`;
}
function mkDraw(id,rowFn,nc){DRAW[id]=function(){
  const q=($(id+'_q').value||'').toLowerCase(),st=$(id+'_st').value;
  let rows=ROWS.filter(r=>(!q||(r.cliente||'').toLowerCase().includes(q))&&(!st||(r.status||'').startsWith(st)));
  $(id+'_c').textContent=rows.length+' de '+ROWS.length;
  $(id+'_b').innerHTML=rows.slice(0,400).map(rowFn).join('')+(rows.length>400?`<tr><td colspan="${nc}" class="muted small">+ ${rows.length-400} (refine a busca)</td></tr>`:'');
};}
function semDados(msg){return `<div class="empty"><div class="big">Sem dados ainda</div>${msg||'Importe a conferencia no Supabase para popular esta tela.'}</div>`}

function aggContadores(){
  const map={};
  ROWS.forEach(r=>{ if(!r.contador_id)return; const c=contById(r.contador_id); if(!c)return; const id=String(c.id);
    if(!map[id])map[id]={id:c.id,nome:c.nome,pct:c.percentual,status:c.comissao_status||'aguardando pagamento',clientes:0,base:0};
    map[id].clientes++; map[id].base+=Number(r.valor_pago)||0; });
  return Object.values(map).map(x=>{ x.comissao = x.pct? x.base*x.pct/100 : 0; return x; }).sort((a,b)=>b.comissao-a.comissao);
}
function viewPagamentos(){
  if(!ROWS.length) return `<h2 class="sec">Pagamentos</h2>`+semDados();
  setTimeout(async()=>{ if(!CONTADORES.length){ const {data}=await SB.from('contadores').select('*'); CONTADORES=data||[]; } pgRender(); },0);
  return `<h2 class="sec">Pagamentos</h2><p class="lead">Comissões a pagar e já enviadas — busque e consulte por contador.</p>
  <div id="pg_kpis"></div>
  <div class="toolbar">
    <input class="search" id="pg_q" placeholder="Buscar contador..." oninput="pgRender()">
    <select id="pg_st" onchange="pgRender()"><option value="">Todos (enviados)</option><option>enviado para pagamento</option><option>pago</option></select>
    <span class="count" id="pg_c"></span>
  </div>
  <div id="pg_list"><div class="muted small">Carregando...</div></div>`;
}
function pgRender(){
  if(!document.getElementById('pg_list'))return;
  const ag=aggContadores().filter(x=>x.status==='enviado para pagamento'||x.status==='pago');
  const totEnv=ag.filter(x=>x.status==='enviado para pagamento').reduce((s,x)=>s+x.comissao,0);
  const totPago=ag.filter(x=>x.status==='pago').reduce((s,x)=>s+x.comissao,0);
  const nEnv=ag.filter(x=>x.status==='enviado para pagamento').length, nPago=ag.filter(x=>x.status==='pago').length;
  const kp=document.getElementById('pg_kpis');
  if(kp) kp.innerHTML=`<div class="kpis">
    <div class="kpi red"><div class="lab">A pagar (enviados)</div><div class="val">${fmt(totEnv)}</div><div class="sub">${nEnv} contadores</div></div>
    <div class="kpi green"><div class="lab">Pagos</div><div class="val">${fmt(totPago)}</div><div class="sub">${nPago} contadores</div></div>
    <div class="kpi"><div class="lab">Na fila</div><div class="val">${ag.length}</div></div></div>`;
  if(!ag.length){ document.getElementById('pg_list').innerHTML='<div class="empty"><div class="big">Nada enviado para pagamento ainda</div>Use o botão "Enviar para pagamento" na aba Comissão contadores — só o que foi conferido e está OK aparece aqui.</div>'; const cc0=document.getElementById('pg_c'); if(cc0)cc0.textContent=''; return; }
  const q=(val('pg_q')||'').toLowerCase(); const st=val('pg_st');
  let list=ag.filter(x=>(!q||(x.nome||'').toLowerCase().includes(q))&&(!st||x.status===st));
  const cc=document.getElementById('pg_c'); if(cc)cc.textContent=list.length+' contadores';
  const body=list.slice(0,300).map(x=>`<tr><td>${x.nome}</td><td class="num">${x.clientes}</td><td class="num">${x.pct?x.pct+'%':'—'}</td><td class="num">${fmt(x.comissao)}</td><td>${statusPill(x.status)}</td></tr>`).join('');
  document.getElementById('pg_list').innerHTML=`<div class="card" style="padding:0"><div class="tablewrap"><table><thead><tr><th>Contador</th><th class="num">Clientes</th><th class="num">%</th><th class="num">Comissão</th><th>Status</th></tr></thead><tbody>${body}</tbody></table></div></div>`+(list.length>300?`<div class="muted small" style="margin-top:8px">+ ${list.length-300} (refine a busca)</div>`:'');
}
function viewVendas(){
  if(ME.role==='vendedor') return `<h2 class="sec">Vendas</h2><div class="banner">Voce ve apenas as suas vendas. Comissoes, pagamentos e o sistema financeiro nao aparecem no seu acesso.</div>`+semDados('Suas vendas aparecerao aqui (cadastro entra na proxima fase).');
  if(!ROWS.length) return `<h2 class="sec">Vendas</h2>`+semDados();
  const h=`<h2 class="sec">Vendas</h2><p class="lead">Base de clientes vendidos com indicacao de contador.</p>
  ${tableUI('vd','<th>Cliente</th><th>Closer</th><th class="num">Usuarios</th><th>Hardware</th><th>Status pgto</th>')}`;
  setTimeout(()=>{mkDraw('vd',r=>`<tr><td>${r.cliente}</td><td>${r.closer||''}</td><td class="num">${r.usuarios||''}</td><td>${r.hardware||'—'}</td><td>${pill(r.status)}</td></tr>`,5);DRAW['vd']();},0);
  return h;
}
function viewComissaoContadores(){
  if(!ROWS.length) return `<h2 class="sec">Comissao contadores</h2>`+semDados();
  setTimeout(ccLoad,0);
  return `<h2 class="sec">Comissao contadores</h2><p class="lead">Selecione um contador para ver os clientes que ele indicou e o total da comissao.</p>
  <div class="toolbar">
    <label class="small muted">Contador:</label>
    <div style="position:relative;min-width:280px">
      <input class="search" id="cc_cont_in" placeholder="Todos — digite para buscar" oninput="ccContType(this.value)" onblur="setTimeout(function(){var b=document.getElementById('cc_cont_results');if(b)b.style.display='none'},200)" autocomplete="off" style="width:100%">
      <div id="cc_cont_results" style="display:none;position:absolute;z-index:30;left:0;right:0;top:38px;background:var(--panel);border:1px solid var(--line);border-radius:9px;max-height:260px;overflow:auto;box-shadow:0 6px 20px rgba(20,40,60,.12)"></div>
    </div>
    <label class="small muted">Periodo:</label>

  const idop=val('cl_id'); if(idop!==''){ const i=parseInt(idop.replace(/\D/g,'')); if(!isNaN(i)) d.id_op=i; }
  const u=val('cl_users'); if(u!==''){ const ui=parseInt(u.replace(/\D/g,'')); if(!isNaN(ui)) d.usuarios=ui; }
  const vp=numBR(val('cl_vpago')); if(vp!=null) d.valor_pago=vp;
  return {d,contName,cid};
}
async function salvarCliente(){
  const {d,contName,cid}=clForm(), msg=document.getElementById('cl_msg');
  if(!d.cliente){ msg.textContent='Informe o nome do cliente.'; return; }
  if(contName && !cid){ msg.textContent='Contador não encontrado: '+contName; return; }
  msg.textContent='Salvando...';
  const res = edCli ? await SB.from('conferencia_comissao').update(d).eq('id',edCli) : await SB.from('conferencia_comissao').insert(d);
  if(res.error){ msg.textContent='Erro: '+res.error.message; return; }
  const {data:rows}=await SB.from('conferencia_comissao').select('*'); ROWS=rows||[];
  msg.textContent=''; cancelarCliente(); renderClientesList();
}
function editarCliente(id){
  const r=ROWS.find(x=>x.id===id); if(!r)return; edCli=id;
  set('cl_id',r.id_op||''); set('cl_nome',r.cliente); set('cl_closer',r.closer); set('cl_cnpj',r.cnpj); set('cl_per',r.periodo); set('cl_users',r.usuarios!=null?r.usuarios:''); set('cl_hw',r.hardware); set('cl_status',r.status||'');
  set('cl_vpago', r.valor_pago!=null? String(r.valor_pago).replace('.',','):'');
  const c=contById(r.contador_id); set('cl_cont', c?c.nome:'');
  const m=r.meses||{}; MESKEYS.forEach(k=> set('cl_'+k, (m[k]&&m[k].v!=null)? String(m[k].v).replace('.',','):''));
  document.getElementById('cl_formtit').textContent='Editar cliente';
  document.getElementById('cl_cancel').style.display='inline-block';
  document.getElementById('cl_nome').scrollIntoView({behavior:'smooth',block:'center'});
}
function cancelarCliente(){
  edCli=null; ['cl_id','cl_nome','cl_closer','cl_cnpj','cl_per','cl_users','cl_hw','cl_vpago','cl_cont','cl_jan','cl_fev','cl_mar','cl_abr','cl_mai','cl_jun'].forEach(i=>set(i,'')); set('cl_status','');
  const t=document.getElementById('cl_formtit'); if(t)t.textContent='Novo cliente';
  const cc=document.getElementById('cl_cancel'); if(cc)cc.style.display='none';
}
async function excluirCliente(id){
  if(!confirm('Excluir este cliente da base de comissão?'))return;
  const {error}=await SB.from('conferencia_comissao').delete().eq('id',id);
  if(error){ alert('Erro: '+error.message); return; }
  ROWS=ROWS.filter(x=>x.id!==id); renderClientesList();
}
function renderClientesList(){
  const el=document.getElementById('cl_listbox'); if(!el)return;
  if(!ROWS.length){ el.innerHTML='<div class="empty"><div class="big">Nenhum cliente ainda</div>Inclua o primeiro no formulário acima.</div>'; return; }
  const q=((document.getElementById('cl_q')||{}).value||'').trim().toLowerCase();
  let list=ROWS;
  if(q){ list=ROWS.filter(r=>{ const nome=(r.cliente||'').toLowerCase(); const idop=String(r.id_op||''); const closer=(r.closer||'').toLowerCase(); let ok=nome.includes(q)||idop.includes(q)||closer.includes(q); if(!ok && q.replace(/\D/g,'').length>=6){ ok=String(r.cnpj||'').replace(/\D/g,'').includes(q.replace(/\D/g,'')); } return ok; }); }
  const cc=document.getElementById('cl_count'); if(cc) cc.textContent = q ? (list.length+' de '+ROWS.length) : (ROWS.length+' clientes');
  const shown=list.slice(0,300);
  const rows=shown.map(r=>{ const c=contById(r.contador_id); return `<tr><td class="num">${r.id_op||''}</td><td>${r.cliente||''}</td><td>${r.closer||''}</td><td>${r.cnpj||'—'}</td><td>${c?c.nome:'<span class="muted">—</span>'}</td><td>${r.periodo||''}</td><td class="num">${r.valor_pago!=null?fmt(r.valor_pago):'—'}</td><td><button class="lk" onclick="editarCliente(${r.id})">editar</button> &nbsp; <button class="lk" onclick="excluirCliente(${r.id})">excluir</button></td></tr>`; }).join('');
  el.innerHTML=`<div class="card" style="padding:0"><div class="tablewrap"><table><thead><tr><th class="num">ID</th><th>Cliente</th><th>Closer</th><th>CNPJ</th><th>Contador</th><th>Período</th><th class="num">Base paga</th><th>Ações</th></tr></thead><tbody>${rows}</tbody></table></div></div>`+(list.length>300?`<div class="muted small" style="margin-top:8px">+ ${list.length-300} (refine a busca)</div>`:'');
}
function viewComissaoVendedores(){
  if(!ROWS.length) return `<h2 class="sec">Comissao vendedores</h2>`+semDados();
  const k=agg();
  const body=k.closers.map(c=>`<tr><td>${c.closer}</td><td class="num">${c.total}</td><td class="num">${c.pago}</td><td class="num">${fmt(c.pagoRS)}</td><td class="num muted">a definir</td></tr>`).join('');
  return `<h2 class="sec">Comissao vendedores</h2><p class="lead">Comissao dos closers — regra a definir. Abaixo, totais por vendedor.</p>
  <div class="banner warn">Regra de comissao de vendedor a definir.</div>
  <div class="card" style="padding:0"><div class="tablewrap"><table><thead><tr><th>Vendedor</th><th class="num">Clientes</th><th class="num">Em dia</th><th class="num">Pago</th><th class="num">Comissao</th></tr></thead><tbody>${body}</tbody></table></div></div>`;
}

function render(){
  elTabs();
  const v=$('view');
  if(tab==='Pagamentos')v.innerHTML=viewPagamentos();
  else if(tab==='Vendas')v.innerHTML=viewVendas();
  else if(tab==='Comissão contadores')v.innerHTML=viewComissaoContadores();
  else if(tab==='Contadores')v.innerHTML=viewContadores();
  else if(tab==='Clientes')v.innerHTML=viewClientes();
  else if(tab==='Comissão vendedores')v.innerHTML=viewComissaoVendedores();
  $('foot').innerHTML='Login e acesso por papel via Supabase. Acesso travado no servidor (RLS): o vendedor nao le o financeiro. Pago = Situacao Recebida/Confirmada no Asaas.';
}

init();
</script>
